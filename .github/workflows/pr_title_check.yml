name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  title-check:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title
        uses: technote-space/pr-title-check-action@v1.0
        with:
          template_path: .github/pull_request_template.md
          ignore_label: 'ignore-pr-title-check'